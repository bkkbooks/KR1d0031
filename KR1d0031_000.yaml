body:
  text: 提要禮類二儀禮之屬儀禮釋宫一卷臣等謹案儀禮釋宫一卷宋李如圭撰如圭既為集釋以發明經義羽翼鄭康成註又為是書以考論古人宫室之制體例仿爾雅釋宫逐條之下引經記註疏詳加討論如大夫士東房西室之説雖仍舊註而據聘禮賓館於大夫士證其亦有右房據鄉飲酒及少牢饋食證大夫士亦有左房東房之稱與天子諸侯言左對右言東對西者同其考證明晰深得經意發先儒之所未發大抵類此非以空言説禮者比也考朱子大全集亦載其文與此大畧相同惟無序引宋中興藝文志稱朱子嘗與之校定禮書疑朱子固嘗録如圭是篇而集朱子之文者遂疑為朱子所撰取以入集猶蘓軾書劉禹錫語題姜秀才課册遂誤編入軾集耳觀朱子儀禮經傳通解於鄉飲酒禮薦出自左房聘禮負右房皆但存賈疏與是篇所言不同是亦不出朱子之一證也古者宫室各有定制歴代屢變漸非其舊如序楹楣阿箱夾牖户當榮當碑之屬讀儀禮者倘不能備知其處則於陳設之地進退之位俱不能知甚或以後世之規模臆測先王之度數殊失其真是篇之作誠治儀禮者之圭臬也宋陳汶嘗序集釋刻之桂林郡學舍兼刻是篇今刻本不𫝊惟永樂大典内全録其文别為一卷題云李如圭儀禮釋宫盖其所據猶為宋本今據以録出仍與集釋相輔其間字與朱子本稍有異同似彼為初藁此為定本今悉從永樂大典所載以復如圭之舊焉乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書儀禮釋宫宋李如圭撰周之禮文盛矣今僅見於儀禮然去古既逺禮經殘闕讀禮者苟不先明乎宫室之制則無以考其登降之節進退之序雖欲追想其盛而以其身揖讓周旋乎其間且不可得况欲求之義乎於是本之於經稽之於注釋取宫室名制之可考者彚而次之曰釋宫宫室之名制不盡見於經其可考者宫必南鄉廟在寢東寢廟案朱子大全集無此二字皆有堂有門其外有大門周禮建國之神位右社稷左宗廟宫南鄉而廟居左則廟在寢東也寢廟之大門一曰外門其北葢直寢故士喪禮注以寢門為内門中門凡既入外門其向廟也皆曲而東行又曲而北按士冠禮賓立于外門之外案儀禮於皆作于下同主人迎賓入每曲揖至于庿門案儀禮廟皆作庿下同注曰入外門將東曲揖直庿將北曲又揖是也又按聘禮公迎賓于大門内每門每曲揖及庿門賈氏曰諸侯五庿太祖之庿居中二昭居東二穆居西每庿之前兩旁有隔牆牆皆有閤門諸侯受聘于太祖庿太祖庿以西隔牆有三入大門東行至太祖庿凡經三閤門故曰每門也大夫三庿其牆與門亦然故賓問卿大夫迎賓入亦每門每曲揖乃及庿門其說當考大夫士之門惟外門内門而已諸侯則三天子則五庠序則惟有一門鄉飲酒射禮主人迎賓于門外入門即三揖至階是也堂之屋南北五架中脊之架曰棟次棟之架曰楣鄉射禮記曰序則物當棟堂則物當楣注曰是制五架之屋也正中曰棟次曰楣前曰􅔑賈氏曰中脊為棟棟南兩架北亦兩架案朱子大全集無此二句棟前一架為楣楣前接簷為􅔑今見於經者惟棟與楣而已棟一名阿案士昬禮賓升當阿致命注曰阿棟也又曰入堂深示親親賈氏曰凡賓升皆當楣此深入當棟故云入堂深也又案聘禮諸侯受聘于庿賓升亦當楣賈氏曰凡堂皆五架則五架之屋通乎上下而其廣狹隆殺則異耳後楣以北為室與房後楣之下以南為堂以北為室與房房東而室西相連為之案少牢饋食禮主人室中獻祝祝拜于席上坐受注曰室中迫狹賈氏曰棟南兩架北亦兩架于棟北楣下為室南壁而開戸以楣後兩架之間為室故云迫狹也昬禮賓當阿致命鄭云入堂深明不入室是棟北乃有室也惟州序之制則無室案鄉射禮記曰序則物當棟堂則物當楣注曰序無室可以深也又禮席賓南面注曰不言于戸牖之間者此射于序賈氏曰無室則無戸牖故也此序之異於餘宫也案朱子大全集無此句釋宫曰無室曰榭榭則序也人君左右房大夫士東房西室而已聘禮記若君不見使大夫受聘升受負右房而立大射儀薦脯醢由左房是人君之房有左右也公食大夫禮記筵出自東房注曰天子諸侯左右房賈氏曰言左對右言東對西大夫士惟東房西室故直云房而已然案聘禮賓館于大夫士君使卿還玉于館也賓亦退負右房則大夫士亦有右房矣又鄉飲酒禮記薦出自左房少牢饋食禮主婦薦自東房亦有左房東房之稱當考案賈氏以言左對右言東對西為人君有左右房之證李氏援聘禮之右房鄉射禮記之左房少牢饋食之東房疑大夫士亦冇右房亦有左房東房之稱實足以訂正舊說之誤又鄉射記籩豆出自東房特牲饋食禮賓與長兄弟之薦自東房有司徹宰夫自東房薦脯醢是大夫士言東對西者固不一賈公彦以聘禮賓禮為正客館非大夫之庿閻若璩尚書古文疏證引其說辨之曰下文公館賓賓辟康成注几君有事于諸臣之家車造庿門乃下賈疏云以其卿館于大夫之庿已不能揜前說之非且古者天子適諸侯必舍其祖庿卿館于大夫大夫館于士士館于工商皆庿也無别所為館舍惟侯氏覲天子賜以舍非庿聘禮安得與之同聘禮一篇自卿致館賓即館後有司入陳注云入賓所館之庿揖入及庿門注云舍于大夫庿卿館于大夫注云館者必于庿不得從公彦曲說江永鄉黨圖考曰天子至士堂房室之制有廣狹降殺堂後為房室左右房以夾室使室居中其制度當同如大夫士東房西室恐不成制度堂上設席行禮常戸牖之間賓席不得當東西之中偏于西北一隅非所以尊賓大夫儐尸尸席不當堂之中亦非所以尊尸皆因鄉飲酒義言設尊賓主共之及拘于四面之坐以辭害意故先儒有此說耳室中西南隅謂之奥邢昺曰室戸不當中而近東西南隅最為深隱故謂之奥而祭祀及尊者常處焉東南隅謂之窔郭氏曰窔亦隱闇東北隅謂之宧郭氏曰宧見禮案禮無言宧者西北隅謂之屋漏詩所謂上不愧于屋漏是也曽子問謂之當室之白案此下朱子大全集有孫炎曰當室日光所漏入也十一字鄭謂當室之白西北隅得戸明者經止曰西北隅室南其戸戸東而牖西說文曰戸半門也牖穿壁以木為交窻也月令正義曰古者窟居開其上取明雨因霤之是以後人名室為中霤開牖者象中霤之取明也牖一名鄉其扇在内案士虞禮祝闔牖戸如食間啟戸啟牖鄉注曰牖先闔後啟扇在内也鄉牖一名是也戸牖之間謂之依案爾雅作扆古通用郭氏曰窻東戸西也覲禮斧依亦以設之于此而得依名士昬禮注曰戸西者尊處以尊者及賓客位於此故又曰客位戸東曰房戸之間士冠禮注曰房戸間者房西室戸東也寢廟以室為主故室戸專得戸名凡言戸者皆室戸若房戸則兼言房以别之大夫士房戸之間于堂為東西之中當兩楹間案詩正義曰鄉飲酒義云尊于房戸之間賓主共之由無西房故以房與室戸之間為中也又鄉飲酒禮席賓于戸牖間而義曰坐賓於西北則大夫士之戸牖間在西而房戸間為正中明矣人君之制經無明證案釋宫曰兩階間謂之鄉郭氏曰人君南鄉當階間則人君之室正中其西為右房而戸牖間設依處正中矣月令正義曰崔氏云宫室之制中央為正室正室左右為房葢謂人君制也案朱子大全集無月令正義一條又案詩斯干曰築室百堵西南其戸箋曰天子之寢左右房異於一房者之室戸也正義曰大夫惟有一東房故室戸偏東與房相近天子諸侯既有右房則室當在其中其戸正中比一房者之室戸為西當考案江永鄉黨圖考曰大夫士之制亦當有左右房鄉飲于庠亦如其制設尊于房戸之間而賓席在尊西主人在阼階上為近東即是賓主共之不必謂在東西之中然後為共也主人在阼介在西階上為東西僎在尊東為東北賓在戸牖間以阼階上視之即為西北不必謂在西北隅然後為西北也其實賓席宜在中南鄉衆賓席以次繼而西僎者鄉之卿大夫來觀禮有無不定本無四面之坐象四時之說倘無觀禮之饌豈四方缺一方四時缺一時乎作義者以臆說禮泥其文遂有大夫士東房西室之說斯干詩西南其戸謂或西其戸或南其户猶南東其畞或南其畞或東其畞也葢此詩言作燕寢其制度不必與正寢同大夫士雖有東西房而陳器服及婦人行禮常在東房經有直言房者省文耳非謂止有一房不必言東也房戸之西曰房外士昬禮記毋南面于房外女出于母左士冠禮尊于房戸之間若庶子則冠于房外南面注曰謂尊東也是房戸之西得房外之名也房戸之東其南當阼階見賈氏釋士冠禮案此條朱子大全集作房之戸于房南壁亦當近東士昏禮注曰北堂在房中半以北南北直室東隅東西直房戸與隅間隅間者葢房東西之中兩隅間也房中之東其南為夾洗直房戸而在房東西之中則房戸在房南壁之東偏可見矣凡八十四字其語䝉溷不可通槩言房南壁之東偏㡬疑在序外直夾矣若云房戸在序内之壁近東偏則可耳房中半以北曰北堂有北階士昬禮記婦洗在北堂直室東隅注曰北堂房中半以北賈氏曰房與室相連為之房無北壁故得北堂之名案特牲饋食禮記尊兩壺于房中西牖下南上内賓立于其北東面南上宗婦北堂北上宗婦在内賓之北案朱子大全集訛作内賓在宗婦之北乃云北堂又婦洗在北堂而直室東隅是房中半以北為北堂也婦洗在北堂而士虞禮主婦洗足爵于房中則北堂亦通名房中矣大射儀工人士與梓人升下自北階注曰位在北堂下則北階者北堂之階也堂之上東西有楹楹柱也古之築室者以垣墉為基而屋其上惟堂上有兩楹而已楹之設葢于前楣之下案鄉射禮曰射自楹間注曰謂射于庠也又曰序則物當棟堂則物當楣物者畫地為物射時所立處也堂則庠之堂也又曰豫則鈎楹内堂則由楹外當物北面揖豫即序也鈎楹繞楹也物當棟而升射者必鈎楹内乃北面就物則棟在楹之内矣物當楣而升射者由楹外北面就物又鄭氏以為物在楹間則楹在楣之下也又案釋宫曰梁上楹謂之梲梲侏儒柱也梁楣也案爾雅杗廇謂之梁其上楹謂之梲又曰楣謂之梁杗廇乃左右縱者楣乃前後横者雖同有梁之名而縱横異侏儒柱在杗廇上以承棟不得在楣此引爾雅釋宫失其實侏儒柱在梁之上則楹在楣之下又可知矣堂東西之中曰兩楹間公食大夫禮致豆實陳于楹外簠簋陳于楹内兩楹間言楹内外矣又言兩楹間知凡言兩楹間者不必與楹相當謂堂東西之中耳南北之中曰中堂聘禮受玉于中堂與東楹之間注曰中堂南北之中也入堂深尊賓事也賈氏曰後楣以南為堂堂凡四架前楣與棟之間為堂南北之中公當楣拜訖更前北侵半架受玉故曰入堂深也案東楹之間侵近東楹非堂東西之中而曰中堂則中堂為南北之中明矣又案士喪禮注曰中以南謂之堂賈氏曰堂上行事非專一所若近戸則言戸東戸西近房則言房外房東近楹則言東楹西楹近序則言東序西序近階則言東階西階其堂半以南無所繼屬者則以堂言之祝淅米于堂是也堂之東西牆謂之序郭氏曰所以序别内外序之外為夾室公食大夫禮大夫立于東夾南注曰東于堂賈氏曰序以西為正堂序東有夾室今立于堂下當東夾是東于堂也又案公食禮宰東夾北西面賈氏曰位在北堂之南與夾室相當特牲饋食禮豆邉鉶在東房注曰東房房中之東當夾北則東夾之北通為房中矣室中之西與右房之制無明文東夾之北為房中則西夾之北葢通為室中其有兩房者則西夾之北通為右房也歟夾室之前曰廂案儀禮作箱古通用亦曰東堂西堂覲禮記注曰東箱東夾之前相翔待事之處特牲饋食禮注曰東堂西堂東西夾之前近南耳賈氏曰西堂即西箱也釋宫曰室有東西箱曰廟郭氏曰夾室前堂是東廂亦曰東堂西廂亦曰西堂也釋宫又曰無東西廂有室曰寢案書顧命路寢有西夾士喪禮死于適寢主人降襲絰于序東注曰序東東夾前則正寢亦有夾與箱矣釋宫所謂無東西箱者或者謂廟之寢也與凡無夾室者則序以外通謂之東堂西堂案鄉射禮射于庠序而主人之弓矢在東序東大射儀射于射宫而君之弓矢適東堂大射之東堂即鄉射之東序東以其無夾與箱故東序東直謂之東堂也此東西堂堂各有階案雜記夫人奔喪升自側階注曰側階旁階奔喪曰婦人奔喪升自東階注曰東階東面階也賈氏釋燕禮曰東面階西面階婦人之升東面階者葢東堂之階其西堂則有西面階也東堂下西堂下曰堂東堂西大射儀賓之弓矢止于西堂下其將射也賓降取弓矢于堂西堂西即西堂下也特牲饋食禮主婦視饎爨于西堂下記曰饎爨在西壁則自西壁以東皆謂之西堂下矣又案大射儀執幂者升自西階注曰羞膳者從而東由堂東升自北階立于房中則東堂下可以逹北堂也堂角有坫士冠禮注曰坫在堂角賈氏釋士喪禮曰堂隅有坫以土為之案江永鄉黨圖考曰堂之四隅即為坫非别有土為之也反坫以反爵崇坫以康圭乃是燒土為之或謂堂隅為坫也堂之側邉曰堂㢘按鄉飲酒禮設席于堂㢘注曰側邉曰㢘喪大記正義曰堂㢘堂基南畔㢘稜之上也又按鄉射禮衆弓倚于堂西矢在其上注曰上堂西㢘則堂之四周皆有㢘也升堂兩階其東階曰阼階士冠禮注曰阼猶酢也東階所以荅酢賓客也每階有東西兩㢘聘禮饔鼎設于西階前當内㢘此則西階之東㢘以其近堂之中故曰内㢘也士之階三等案士冠禮降三等受爵弁注曰下至地賈氏曰匠人云天子之堂九尺賈馬以為階九等諸侯堂宜七尺階七等大夫宜五尺階五等士宜三尺故階三等也兩階各在楹之外而近序案鄉射禮升階者升自西階繞楹而東燕禮媵爵者二人升自西階序進東楹之西酌散交于楹北注曰楹北西楹之北則西階在西楹之西矣士冠禮冠于東序之筵而記曰冠于阼喪禮攢置于西序而檀弓曰周人殯于西階之上故知階近序也堂下至門謂之庭三分庭一在北設碑聘禮注曰宫必有碑所以識日景知陰陽也賈氏釋士昏禮曰碑在堂下三分庭一在北案聘禮歸饔餼醯醢夾碑米設于中庭注曰庭實固當中庭言中庭者南北之中也列當醯醢南列米在醯醢南而當庭南北之中則三分庭一在北設碑可見矣聘禮注又曰設碑近如堂深堂深謂從堂㢘北至房室之壁也三分庭一在北設碑而碑如堂深則庭葢三堂之深也又按鄉射之侯去堂三十丈大射之侯去堂五十四丈則庭之深可見而君大夫宫室隆殺之度亦從可推矣堂塗謂之陳郭氏曰堂下至門徑也其北屬階其南接門内霤案凡入門之後皆三揖至階昬禮注曰三揖者至内霤將曲揖既曲北面揖當碑揖賈氏曰至内霤將曲者至門内霤主人將東賓將西賓主相背時也既曲北面者賓主各至堂塗北行向堂時也至内霤而東西行趨堂塗則堂塗接于霤矣既至堂塗北面至階而不復有曲則堂塗直階矣又案聘禮饔鼎設于西階前陪鼎當内㢘注曰當階内㢘辟堂塗也西階之東㢘為内㢘陪鼎在饔鼎之後設之當西階内㢘以辟堂塗案朱子大全集無西階之東㢘為内㢘以下二十六字則堂塗在階㢘之内矣案此句有訛舛既云當階内㢘以辟堂塗則堂塗正直階當云則階内㢘在堂塗之内矣乃通朱子大全集與此同誤鄉飲酒禮注三揖又曰將進揖當陳揖當碑揖陳即堂塗也中間屋為門門之中有闑士冠禮曰席于門中闑西閾外注曰闑橛也玉藻正義曰闑門之中央所豎短木也釋宫曰樴在地者謂之臬郭氏曰即門橛也然則闑者門中所豎短木在地者也其東曰闑東其西曰闑西門限之謂閾釋宫曰柣謂之閾郭氏曰閾門限邢昺曰謂門下横木為内外之限也其門之兩旁木則謂之棖棖闑之間則謂之中門見禮記闔謂之扉邢昺曰闔門扇也其東扉曰左扉門之廣狹案士昬禮曰納徵儷皮記曰執皮左首隨入注曰為門中阨狹賈氏曰皮皆横執之門中阨狹故隨入也匠人云廟門容大扃七个大扃牛鼎之扃長三尺七个二丈一尺彼天子廟門此士之廟門降殺甚小故云阨狹也推此則自士以上宫室之制雖同而其廣狹則異矣夾門之堂謂之塾釋宫曰門側之堂謂之塾郭氏曰夾門堂也門之内外其東西皆有塾一門而塾四其外塾南鄉案士虞禮陳鼎在門外之右匕俎在西塾之西注曰塾有西者是室南鄉又案士冠禮擯者負東塾注曰東塾門内東堂負之北面則内塾北鄉也又案月令祀竈注曰席于門之奥正義曰神位在西席于門外西室之奥也門外之室有奥則門室之制葢亦如堂之室矣案朱子大全集無此條凡門之内兩塾之間謂之宁案聘禮賓問卿大夫迎于外門外及庿門大夫揖入擯者請命賓入三揖竝行注曰大夫揖入者省内事也既而俟于宁也凡至門内霤為三揖之始上言揖入下言三揖竝行則俟于霤南門内兩塾間可知矣李巡曰宁正門内兩塾間義與鄭同謂之宁者以人君門外有正朝視朝則于此宁立故耳周人門與堂脩廣之數不著于經案匠人云夏后氏世室堂脩二七廣四脩一堂脩謂堂南北之深其廣則益以四分脩之一也門堂三之二室三之一者門堂通謂門與塾其廣與脩取數於堂得其三之二室三之一者兩室與門各居一分也此夏后氏之制周人門堂之制葢亦如此云門之内外東方曰門東西方曰門西特牲饋食禮注曰凡鄉内以入為左右鄉外以出為左右士冠禮注又曰出以東為左入以東為右以入為左右則門西為左門東為右鄉飲酒禮賓入門左燕禮卿大夫皆入門右是也以出為左右則門東為左門西為右士冠禮主人迎賓出門左西面士虞禮側亨于庿門外之右是也闑東曰闑右亦自入者言之也天子諸侯門外之制其見于經者天子有屏諸侯有朝案覲禮侯氏入門右告聽事出自屏南適門西注曰天子外屏釋宫曰屏謂之樹郭氏曰小墻當門中曲禮正義曰天子外屏屏在路門之外諸侯内屏屏在路門之内此侯氏出門而隱于屏則天子外屏明矣釋宫又曰門屏之間謂之宁謂宁在門之内屏之外此屏据諸侯内屏而言也案原本脫之間至此屏凡十六字據朱子大全集補諸侯路寢門外則有正朝大門外則有外朝案聘禮夕幣于寢門外宰入告具于君君朝服出門左南鄉注曰寢門外朝也入告入路門而告賈氏曰此路門外正朝之處也是正朝在寢門外也聘禮又曰賓死介復命柩止于門外若介死惟上介造于朝注曰門外大門外也必以柩造朝逹其忠心又賓拜饔餼于朝注曰拜于大門外賈氏曰大門外諸侯之外朝也賓拜于朝無入門之文則諸侯外朝在大門外明矣是外朝在大門外也諸侯三朝其燕朝在寢燕禮是也正朝與外朝之制度不見于經葢不可得而考矣寢之後有下室士喪禮記士處適寢又曰朔月若薦新則不饋于下室注曰如今之内堂正寢聽朝事賈氏曰下室燕寢也然則士之下室于天子諸侯則為小寢也春秋傳曰子太叔之庿在道南其寢在庿北其寢庿之寢也庿寢在庿之北則下室在適寢之後可知矣又案喪服傳曰有東宫有西宫有南宫有北宫異宫而同財内則曰由命士以上父子皆異宫賈氏釋士昬禮曰異宫者别有寢若不命之士父子雖大院同居其中亦隔别各有門戸則宫之外又有異宫也自門以北皆周以牆聘禮釋幣于行注曰喪禮有毁宗躐行出于大門則行神之位在庿門外西方檀弓正義曰毁宗躐行毁西邉牆以出柩也士喪禮為垼于西牆下注曰西牆中庭之西特牲饋食禮主婦視饎爨于西堂下記曰饎爨在西壁注曰堂之西牆下案門之西有牆則牆屬于門矣西牆在中庭之西則牆周乎庭矣西壁在西堂下則牆周乎堂矣牆者墉壁之總名室中謂之墉昬禮尊于室中北墉下是也房與夾亦謂之墉冠禮陳服于房中西墉下聘禮西夾六豆設于西墉下是也堂上謂之序室房與夾謂之墉堂下謂之壁謂之牆其實一也隨所在而異其名耳堂下之壁闈門在焉案士冠禮冠者降適東壁見于母注曰適東壁者出闈門也時母在闈門之外婦人入庿由闈門士虞禮賓出主人送主婦亦拜賓注曰女賓也不言出不言送拜之于闈門之内闈門如今之東西掖門釋宫曰宫中之門謂之闈郭氏曰謂相通小門也是正門之外又有闈門而在旁壁也人君之堂屋為四注大夫士則南北兩下而已士冠禮設洗直于東榮注曰榮屋翼也周制自卿大夫以下其室為夏屋燕禮設洗當東霤注曰人君為殿屋也案考工記殷人四阿重屋注曰四阿若今之四注屋殷人始為四注屋則夏后氏之屋南北兩下而已周制天子諸侯得為殿屋四注卿大夫以下但為夏屋兩下四注則南北東西皆有霤兩下則惟南北有霤東西有榮是以燕禮言東霤而大夫士禮則言東榮也霤者說文曰屋水流也徐鍇曰屋檐滴處榮者說文曰屋梠之兩頭起者為榮又曰梠齊謂之檐楚謂之梠郭璞注上林賦曰南榮屋南檐也義與說文同然則檐之東西兩頭起者曰榮謂之榮者為屋之榮飾謂之屋翼者言檐角之軒張如翬斯飛耳士喪禮升自前東榮喪大記降自西北榮是屋有四榮也門之屋雖人君亦兩下為之燕禮之門内霤則門屋之北霤也凡屋之檐亦謂之宇案士喪禮為銘置于宇西階上注曰宇梠也說文曰宇屋邉也釋宫曰檐謂之樀郭氏曰屋梠邢昺曰屋檐一名樀一名宇皆屋之四垂也宇西階上者西階之上上當宇也階之上當宇則堂㢘與坫亦當宇矣特牲饋食主婦視饎爨于西堂下注曰南齊于坫其記又注曰南北直屋梠是也階上當宇故階當霤鄉射禮記磬階間縮霤是也縮從也霤以東西為從故曰縮霤此霤謂堂之南霤也此其著于經而可考者也禮經雖亡缺然于覲見天子之禮於燕射聘食見諸侯之禮餘篇見大夫士之禮宫室之名制不見其有異特其廣狹降殺不可考耳案書顧命成王崩于路寢其陳位也有設斧依牖間南鄉則戸牖間也西序東嚮東序西嚮則東西序也西夾南嚮則夾室也東房西房則左右房也賓階面阼階面則兩階前也左塾之前右塾之前則門内之塾也畢門之内則路寢門也兩階戺則堂㢘也東堂西堂則東西廂也東垂西垂則東西堂之宇階上也側階則北階也又曰諸侯出庿門俟則與士喪禮殯宫曰庿合也然則鄭氏謂天子庿及路寢如明堂制者葢未必然明堂位與考工記所記明堂之制度者非出于舊典亦未敢必信也又案書多士傳曰天子之堂廣九雉三分其廣以二為内五分内以一為髙東房西房北堂各三雉公侯七雉三分廣以二為内五分内以一為髙東房西房北堂各二雉伯子男五雉三分廣以二為内五分内以一為髙東房西房北堂各一雉士三雉三分廣以二為内五分内以一為髙有室無房堂注曰廣榮間相去也雉長三丈内堂東西序之内也髙穹髙也此傳說房堂及室與經亦不合然必有所自姑存之以備參考
